app = 'advising-system-backend'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  SERVER_PORT = '8080'
  SPRING_APPLICATION_NAME = 'Advising System API'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '20s'
    method = 'get'
    path = '/api/dashboard/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
